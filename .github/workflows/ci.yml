name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    name: Type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check (src + tests + examples)
        run: npm run typecheck:all
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  bench:
    name: Performance benchmarks (tracked, non-blocking)
    runs-on: ubuntu-latest
    # Perf thresholds on shared CI runners are noise-prone, so this job tracks
    # the hot-path benchmarks as an uploaded artifact rather than hard-failing
    # on a regression. Promote to a gate once a stable runner + baseline exist
    # (see docs/CURRENT_STATUS_IN_REDESIGN_PLAN.md, PR3).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run benchmarks
        run: npm run bench:ci
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.json
          if-no-files-found: warn
