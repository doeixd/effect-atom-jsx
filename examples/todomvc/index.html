<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>effect-atom-jsx TodoMVC</title>
  <style>
    :root {
      --bg: #f4f6f1;
      --ink: #202621;
      --muted: #6a766d;
      --card: #ffffff;
      --line: #d7ded5;
      --accent: #0f766e;
      --accent-soft: #d6f0ed;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, #e9f2e4 0, transparent 38%),
        radial-gradient(circle at 80% 0%, #ddeff7 0, transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: "Atkinson Hyperlegible", "Segoe UI", sans-serif;
      display: grid;
      place-items: start center;
      padding: 2rem 1rem 3rem;
    }
    .shell { width: min(860px, 100%); }
    .hero h1 { margin: 0; font-size: clamp(2rem, 5vw, 3rem); }
    .hero p { margin-top: 0.35rem; color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 8px 26px rgba(7, 16, 10, 0.06);
    }
    .new-todo, .edit {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
      padding: 0.75rem 0.9rem;
      outline: none;
    }
    .new-todo:focus, .edit:focus { border-color: var(--accent); }
    .hint { color: var(--muted); margin: 0.6rem 0; }
    .error { color: var(--danger); margin: 0.6rem 0; }
    .todo-list { list-style: none; margin: 0.8rem 0 0; padding: 0; display: grid; gap: 0.5rem; }
    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
      background: #fbfcfa;
    }
    .todo-item.done span { text-decoration: line-through; color: var(--muted); }
    .row { display: flex; align-items: center; gap: 0.6rem; width: calc(100% - 44px); }
    .row span { cursor: text; }
    .destroy {
      border: 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #fbe4df;
      color: #7f1d1d;
      cursor: pointer;
      font-weight: 700;
    }
    .footer {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 0.6rem;
    }
    .filters { display: flex; gap: 0.4rem; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
    }
    button.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #0b4f49;
    }
    .clear:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { color: var(--muted); font-size: 0.95rem; margin-top: 0.85rem; }
    @media (max-width: 720px) {
      .footer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
