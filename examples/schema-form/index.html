<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>effect-atom-jsx schema form</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    .form-field { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .form-field.invalid { border-color: #e74c3c; }
    .form-field.valid { border-color: #27ae60; }
    label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .error { color: #e74c3c; font-size: 0.9rem; margin-top: 0.25rem; }
    .meta { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
    .meta span { margin-right: 1rem; }
    button { margin: 0.25rem; padding: 0.4rem 0.8rem; font-size: 1rem; cursor: pointer; }
    .result { background: #f8f9fa; border-radius: 4px; padding: 0.75rem; margin-top: 1rem; font-family: monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
